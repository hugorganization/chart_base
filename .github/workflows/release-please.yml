name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: azure/setup-helm@v4

      - uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Con skip-github-release, release-please no crea el tag (lo hace chart-releaser)
      # y por tanto nunca pasa sus release PRs de "pending" a "tagged". Al encontrarse
      # uno mergeado y pendiente aborta con "There are untagged, merged release PRs
      # outstanding" y deja de abrir PRs de release. Cerramos el ciclo aqui.
      - name: Mark published release PRs as tagged
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --state merged --label "autorelease: pending" --json number --jq '.[].number' |
            while read -r pr; do
              echo "Marking PR #$pr as tagged"
              gh pr edit "$pr" --add-label "autorelease: tagged" --remove-label "autorelease: pending"
            done